name: AI Minecraft Mod Pipeline (Free APIs)

on:
  workflow_dispatch:
    inputs:
      modspec_json:
        description: 'The mod specification (JSON)'
        required: true
        type: string

env:
  PYTHON_VERSION: '3.11'
  FORGE_VERSION: '1.20.1-48.1.0'          # adjust if needed
  GRADLE_VERSION: '8.5'

jobs:
  build-mod:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
    # ──────────────────────────────────────
    # 1. Checkout repository
    # ──────────────────────────────────────
    - name: Checkout code
      uses: actions/checkout@v4

    # ──────────────────────────────────────
    # 2. Setup Python
    # ──────────────────────────────────────
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        pip install -r scripts/requirements.txt

    # ──────────────────────────────────────
    # 3. Setup Java & Gradle
    # ──────────────────────────────────────
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          .gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('build.gradle', 'settings.gradle') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Ensure Gradle wrapper and Forge MDK
      run: |
        if [ ! -f gradlew ]; then
          echo "No Gradle wrapper found. Downloading Forge MDK for ${{ env.FORGE_VERSION }}..."
          wget -q "https://maven.minecraftforge.net/net/minecraftforge/forge/${{ env.FORGE_VERSION }}/forge-${{ env.FORGE_VERSION }}-mdk.zip"
          unzip -q "forge-${{ env.FORGE_VERSION }}-mdk.zip"
          rm "forge-${{ env.FORGE_VERSION }}-mdk.zip"
          chmod +x gradlew
        fi
        if [ ! -f settings.gradle ]; then
          echo "rootProject.name = 'modgen'" > settings.gradle
        fi

    # ──────────────────────────────────────
    # 4. Load and save the modspec
    # ──────────────────────────────────────
    - name: Save input modspec to file
      run: |
        echo '${{ github.event.inputs.modspec_json }}' > input_modspec.json
        echo "=== Received modspec ==="
        cat input_modspec.json

    # ──────────────────────────────────────
    # 5. Enrich modspec with OpenRouter
    # ──────────────────────────────────────
    - name: Enrich modspec via OpenRouter
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      run: |
        python scripts/modspec_enhancer.py input_modspec.json enriched_modspec.json
        echo "=== Enriched modspec ==="
        cat enriched_modspec.json

    # ──────────────────────────────────────
    # 6. Generate Java source code (with self‑heal)
    # ──────────────────────────────────────
    - name: Generate Java code with AI (OpenRouter)
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      run: |
        mkdir -p src/main/java
        python scripts/code_generator.py enriched_modspec.json src/main/java
        echo "Generated source files:"
        find src/main/java -name "*.java" | head -20

    # ──────────────────────────────────────
    # 7. Generate textures using ModelsLab
    # ──────────────────────────────────────
    - name: Generate pixel art textures (ModelsLab)
      env:
        MODELSLAB_API_KEY: ${{ secrets.MODELSLAB_API_KEY }}
      run: |
        mkdir -p assets
        python scripts/texture_generator.py enriched_modspec.json assets
        echo "Generated textures:"
        find assets -name "*.png" | head -20

    # ──────────────────────────────────────
    # 8. (Optional) Generate structures with fal.ai
    #     Enable by removing 'if: false'
    # ──────────────────────────────────────
    - name: Generate structures (fal.ai)
      if: false
      env:
        FALAI_API_KEY: ${{ secrets.FALAI_API_KEY }}
      run: |
        python scripts/structure_generator.py enriched_modspec.json assets

    # ──────────────────────────────────────
    # 9. Build final JAR
    # ──────────────────────────────────────
    - name: Build mod JAR
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      run: |
        python scripts/builder.py enriched_modspec.json
        echo "Build artifacts:"
        ls -lh build/libs/

    # ──────────────────────────────────────
    # 10. Upload JAR as artifact
    # ──────────────────────────────────────
    - name: Upload mod artifact
      uses: actions/upload-artifact@v4
      with:
        name: mod-jar
        path: build/libs/*.jar
        if-no-files-found: error

    # ──────────────────────────────────────
    # 11. Commit generated files back to repo (optional)
    # ──────────────────────────────────────
    - name: Commit generated files
      if: success()
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add src/ assets/ enriched_modspec.json build.gradle
        git diff --cached --quiet || git commit -m "🤖 Auto-generated mod from GUI [skip ci]"
        git push
