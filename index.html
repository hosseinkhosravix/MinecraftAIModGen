<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Minecraft Mod Crafter – AI Generator</title>
  <link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      image-rendering: pixelated;
    }
    body {
      background: #2D2D2D url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><rect width="32" height="32" fill="%235B3A1B"/><rect x="16" y="16" width="16" height="16" fill="%234A2E14"/></svg>');
      background-size: 32px 32px;
      font-family: 'Minecraftia', monospace;
      color: #fff;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #6B4F33;
      border: 4px solid #3A2A1A;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 25px rgba(0,0,0,0.8);
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 2.5rem;
      text-shadow: 4px 4px #2D2D2D;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .section {
      background: #8B6E4E;
      border: 3px solid #5A3D2B;
      padding: 15px;
      margin: 15px 0;
    }
    .section h2 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .form-group {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
    }
    label {
      font-size: 1rem;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    input, select, textarea {
      background: #D3C5B5;
      border: 2px solid #3A2A1A;
      padding: 8px;
      font-family: inherit;
      font-size: 1rem;
      color: #1E1E1E;
      image-rendering: auto;
    }
    textarea {
      resize: vertical;
      min-height: 60px;
    }
    .grid-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    button {
      background: #4CAF50;
      border: 3px solid #2E7D32;
      color: white;
      font-family: inherit;
      font-size: 1.2rem;
      padding: 12px 24px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 6px #1B5E20;
      transition: 0.1s linear;
      margin-top: 10px;
    }
    button:hover {
      background: #66BB6A;
    }
    button:active {
      box-shadow: 0 2px #1B5E20;
      transform: translateY(4px);
    }
    button:disabled {
      background: #777;
      border-color: #555;
      box-shadow: 0 6px #444;
      cursor: not-allowed;
    }
    .status {
      margin: 15px 0;
      padding: 10px;
      background: #2C2C2C;
      border: 2px solid #FFC107;
      color: #FFC107;
      display: none;
    }
    .download-link {
      display: inline-block;
      background: #2196F3;
      border: 3px solid #0D47A1;
      color: white;
      padding: 10px 20px;
      text-decoration: none;
      margin-top: 10px;
      box-shadow: 0 4px #0D47A1;
    }
    .download-link:hover {
      background: #42A5F5;
    }
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .alert {
      padding: 10px;
      margin: 10px 0;
      border-left: 5px solid;
      background: #4A4A4A;
    }
    .alert-error {
      border-color: #F44336;
      background: #5C3A3A;
    }
    .alert-success {
      border-color: #4CAF50;
      background: #3A5C3A;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>⛏️ Minecraft Mod Crafter ⚡</h1>
  <p style="text-align:center;margin-bottom:20px;">Fill in the details, then click <strong>"Craft Mod"</strong>. Your mod will be generated by AI and built automatically.</p>

  <!-- BASIC INFO -->
  <div class="section">
    <h2><span>📦</span> Basic Info</h2>
    <div class="grid-2col">
      <div class="form-group">
        <label>Mod Name</label>
        <input type="text" id="modName" placeholder="e.g., Lightning Swords" required>
      </div>
      <div class="form-group">
        <label>Mod ID (auto‑filled)</label>
        <input type="text" id="modId" placeholder="lightning_swords" readonly required>
      </div>
      <div class="form-group">
        <label>Version</label>
        <input type="text" id="modVersion" value="1.0.0" required>
      </div>
      <div class="form-group">
        <label>Minecraft Version</label>
        <select id="mcVersion">
          <option value="1.20.1" selected>1.20.1</option>
          <option value="1.19.4">1.19.4</option>
          <option value="1.18.2">1.18.2</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Loader</label>
      <select id="loader">
        <option value="forge" selected>Forge</option>
        <option value="fabric">Fabric</option>
      </select>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="description" placeholder="A short description of your mod..."></textarea>
    </div>
  </div>

  <!-- ITEMS / BLOCKS -->
  <div class="section">
    <h2><span>🗡️</span> Items & Blocks</h2>
    <div id="itemsContainer"></div>
    <button type="button" id="addItemBtn">+ Add Item</button>
    <p style="font-size:0.8rem;margin-top:5px;">Describe each item's texture, type, and properties.</p>
  </div>

  <!-- MOBS -->
  <div class="section">
    <h2><span>🐷</span> Mobs & Entities</h2>
    <div id="mobsContainer"></div>
    <button type="button" id="addMobBtn">+ Add Mob</button>
  </div>

  <!-- GENERATION BUTTON -->
  <div style="text-align:center;">
    <button id="craftBtn">⚒️ Craft Mod</button>
  </div>

  <!-- STATUS & DOWNLOAD -->
  <div id="statusBox" class="status"></div>
  <div id="downloadArea" style="text-align:center;margin-top:15px;"></div>
</div>

<script>
  // ---------- CONFIGURATION (YOUR REPO) ----------
  const GITHUB_TOKEN = ''; // Leave empty – you will be prompted
  const REPO_OWNER = 'hosseinkhosravix';
  const REPO_NAME = 'MinecraftAIModGen';
  const WORKFLOW_ID = 'mod-pipeline.yml';   // The filename of your workflow

  // ---------- UTILS ----------
  function autoModId(name) {
    return name.toLowerCase().replace(/[^a-z0-9_]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
  }

  // Auto-fill mod ID
  document.getElementById('modName').addEventListener('input', function(e) {
    const modIdInput = document.getElementById('modId');
    if (!modIdInput.dataset.manual) {
      modIdInput.value = autoModId(e.target.value);
    }
  });
  document.getElementById('modId').addEventListener('input', function() {
    this.dataset.manual = 'true';
  });

  // ----- ITEM ROW TEMPLATE -----
  function createItemRow() {
    return `
      <div class="grid-2col item-row" style="margin-bottom:10px; padding:10px; background:#A38D6D; border:2px solid #5A3D2B;">
        <div class="form-group">
          <label>Item Name</label>
          <input type="text" class="item-name" placeholder="e.g., Lightning Sword" required>
        </div>
        <div class="form-group">
          <label>Item ID</label>
          <input type="text" class="item-id" placeholder="lightning_sword" required>
        </div>
        <div class="form-group">
          <label>Type</label>
          <select class="item-type">
            <option value="sword">Sword</option>
            <option value="pickaxe">Pickaxe</option>
            <option value="axe">Axe</option>
            <option value="shovel">Shovel</option>
            <option value="hoe">Hoe</option>
            <option value="food">Food</option>
            <option value="block">Block</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Texture Description</label>
          <input type="text" class="item-texture" placeholder="pixel art, 16x16, Minecraft style, lightning sword">
        </div>
        <div class="form-group">
          <label>Special Properties (JSON or text)</label>
          <input type="text" class="item-props" placeholder='{"damage": 10, "effect": "lightning"}'>
        </div>
        <button type="button" class="remove-btn" style="background:#c0392b;border-color:#922b21;font-size:0.9rem;padding:6px 10px;margin-top:5px;">Remove</button>
      </div>
    `;
  }

  // ----- MOB ROW TEMPLATE -----
  function createMobRow() {
    return `
      <div class="grid-2col mob-row" style="margin-bottom:10px; padding:10px; background:#A38D6D; border:2px solid #5A3D2B;">
        <div class="form-group">
          <label>Mob Name</label>
          <input type="text" class="mob-name" placeholder="e.g., Thunder Zombie" required>
        </div>
        <div class="form-group">
          <label>Mob ID</label>
          <input type="text" class="mob-id" placeholder="thunder_zombie" required>
        </div>
        <div class="form-group">
          <label>Health</label>
          <input type="number" class="mob-health" value="20" min="1">
        </div>
        <div class="form-group">
          <label>Behavior</label>
          <select class="mob-behavior">
            <option value="hostile">Hostile</option>
            <option value="passive">Passive</option>
            <option value="neutral">Neutral</option>
          </select>
        </div>
        <div class="form-group" style="grid-column: span 2;">
          <label>Texture Description</label>
          <input type="text" class="mob-texture" placeholder="pixel art, Minecraft zombie with lightning aura">
        </div>
        <button type="button" class="remove-btn" style="background:#c0392b;border-color:#922b21;font-size:0.9rem;padding:6px 10px;margin-top:5px;">Remove</button>
      </div>
    `;
  }

  // Add/remove items
  document.getElementById('addItemBtn').addEventListener('click', () => {
    const container = document.getElementById('itemsContainer');
    const div = document.createElement('div');
    div.innerHTML = createItemRow();
    container.appendChild(div.firstElementChild);
    attachRemoveHandlers();
  });

  // Add/remove mobs
  document.getElementById('addMobBtn').addEventListener('click', () => {
    const container = document.getElementById('mobsContainer');
    const div = document.createElement('div');
    div.innerHTML = createMobRow();
    container.appendChild(div.firstElementChild);
    attachRemoveHandlers();
  });

  function attachRemoveHandlers() {
    document.querySelectorAll('.remove-btn').forEach(btn => {
      btn.onclick = function() {
        this.closest('.item-row, .mob-row').remove();
      };
    });
  }
  attachRemoveHandlers();

  // ----- COLLECT FORM DATA INTO JSON -----
  function gatherModSpec() {
    const items = [];
    document.querySelectorAll('.item-row').forEach(row => {
      items.push({
        name: row.querySelector('.item-name').value.trim(),
        id: row.querySelector('.item-id').value.trim().toLowerCase().replace(/\s+/g, '_'),
        type: row.querySelector('.item-type').value,
        texture_description: row.querySelector('.item-texture').value.trim(),
        properties: row.querySelector('.item-props').value.trim()
      });
    });

    const mobs = [];
    document.querySelectorAll('.mob-row').forEach(row => {
      mobs.push({
        name: row.querySelector('.mob-name').value.trim(),
        id: row.querySelector('.mob-id').value.trim().toLowerCase().replace(/\s+/g, '_'),
        health: parseInt(row.querySelector('.mob-health').value) || 20,
        behavior: row.querySelector('.mob-behavior').value,
        texture_description: row.querySelector('.mob-texture').value.trim()
      });
    });

    return {
      mod_name: document.getElementById('modName').value.trim(),
      modid: document.getElementById('modId').value.trim(),
      version: document.getElementById('modVersion').value.trim(),
      mc_version: document.getElementById('mcVersion').value,
      loader: document.getElementById('loader').value,
      description: document.getElementById('description').value.trim(),
      items: items,
      mobs: mobs
    };
  }

  // Validate modspec
  function validateModSpec(spec) {
    if (!spec.mod_name || !spec.modid) return 'Mod Name and Mod ID are required.';
    if (!/^[a-z][a-z0-9_]*$/.test(spec.modid)) return 'Mod ID must be lowercase letters, numbers, and underscores, starting with a letter.';
    return null;
  }

  // ----- GITHUB API INTEGRATION -----
  async function triggerWorkflow(spec, token) {
    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/${WORKFLOW_ID}/dispatches`;
    const body = {
      ref: 'main',
      inputs: {
        modspec_json: JSON.stringify(spec)
      }
    };

    const response = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
        'User-Agent': 'ModPipeline/1.0'
      },
      body: JSON.stringify(body)
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(`GitHub API error ${response.status}: ${errText}`);
    }

    // The dispatch endpoint returns 200 with a JSON containing workflow_run_id
    const data = await response.json();
    return data.workflow_run_id;
  }

  async function getRunStatus(runId, token) {
    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/runs/${runId}`;
    const res = await fetch(url, {
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'User-Agent': 'ModPipeline/1.0'
      }
    });
    if (!res.ok) throw new Error('Failed to fetch run status.');
    return await res.json();
  }

  async function getArtifacts(runId, token) {
    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/runs/${runId}/artifacts`;
    const res = await fetch(url, {
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'User-Agent': 'ModPipeline/1.0'
      }
    });
    if (!res.ok) throw new Error('Failed to fetch artifacts.');
    const data = await res.json();
    return data.artifacts;
  }

  // ----- MAIN FLOW -----
  document.getElementById('craftBtn').addEventListener('click', async () => {
    const statusBox = document.getElementById('statusBox');
    const downloadArea = document.getElementById('downloadArea');
    statusBox.style.display = 'block';
    statusBox.innerHTML = '<span class="loader"></span> Gathering mod data...';
    downloadArea.innerHTML = '';

    try {
      // Step 1: Validate form
      const spec = gatherModSpec();
      const validationError = validateModSpec(spec);
      if (validationError) throw new Error(validationError);

      // Step 2: Get token
      let token = GITHUB_TOKEN;
      if (!token) {
        token = prompt('Enter your GitHub personal access token (with actions:write and contents:read scopes):');
        if (!token) throw new Error('GitHub token is required.');
      }

      // Step 3: Trigger workflow and get run ID
      statusBox.innerHTML = '⏳ Triggering AI mod generation...';
      const runId = await triggerWorkflow(spec, token);
      statusBox.innerHTML = `✅ Workflow started! Run ID: ${runId}. Waiting for completion...`;

      // Step 4: Poll run status
      let run = await getRunStatus(runId, token);
      while (run.status !== 'completed') {
        await new Promise(r => setTimeout(r, 15000));
        run = await getRunStatus(runId, token);
        statusBox.innerHTML = `🔄 Workflow status: ${run.status} (${run.conclusion || 'in_progress'})...`;
      }

      if (run.conclusion !== 'success') {
        throw new Error(`Workflow failed with conclusion: ${run.conclusion}. Check the Actions tab for details.`);
      }

      // Step 5: Get artifact download URL
      const artifacts = await getArtifacts(runId, token);
      if (artifacts.length === 0) throw new Error('No artifacts found. The mod may have failed to build.');

      const modArtifact = artifacts.find(a => a.name === 'mod-jar') || artifacts[0];
      // The artifact download URL is: /repos/{owner}/{repo}/actions/artifacts/{artifact_id}/zip
      const downloadUrl = `https://github.com/${REPO_OWNER}/${REPO_NAME}/actions/runs/${runId}/artifacts/${modArtifact.id}`;

      downloadArea.innerHTML = `
        <a class="download-link" href="${downloadUrl}" target="_blank">⬇️ Download Mod (.jar)</a>
        <p style="margin-top:10px;">You can also find the artifact on the <a href="https://github.com/${REPO_OWNER}/${REPO_NAME}/actions/runs/${runId}" target="_blank">run page</a>.</p>
      `;
      statusBox.innerHTML = '✅ Mod generated successfully!';
      statusBox.style.borderColor = '#4CAF50';
      statusBox.style.color = '#4CAF50';

    } catch (err) {
      statusBox.innerHTML = `❌ Error: ${err.message}`;
      statusBox.style.borderColor = '#F44336';
      statusBox.style.color = '#F44336';
      downloadArea.innerHTML = '';
      console.error(err);
    }
  });

  // Prepopulate with one default item and mob for easy testing
  window.addEventListener('load', () => {
    if (document.querySelectorAll('.item-row').length === 0) {
      document.getElementById('addItemBtn').click();
    }
    if (document.querySelectorAll('.mob-row').length === 0) {
      document.getElementById('addMobBtn').click();
    }
  });
</script>
</body>
</html>
